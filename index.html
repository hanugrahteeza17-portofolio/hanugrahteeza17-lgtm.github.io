<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Hannugrah</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0a0f1c;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    background: #0a0f1c;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

/* HERO */
.hero {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 100vh;
}

.hero-text h1 {
    font-size: 50px;
}

.hero-text span {
    color: cyan;
}

/* FOTO GLOW (IPHONE STYLE) */
.hero img {
    width: 250px;
    border-radius: 50%;
    box-shadow: 0 0 30px cyan, 0 0 60px blue;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: cyan;
    border-radius: 30px;
    color: black;
    text-decoration: none;
}

/* SKILLS */
.skills {
    padding: 50px;
}

.bar {
    background: #222;
    border-radius: 10px;
    margin: 10px 0;
}

.bar div {
    height: 10px;
    background: cyan;
    border-radius: 10px;
}

/* PROJECT */
.project {
    padding: 50px;
    display: flex;
    gap: 20px;
}

.card {
    background: #111;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px cyan;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>Portfolio</h2>
    <div>
        <a href="#">Home</a>
        <a href="#skills">Skills</a>
        <a href="#project">Project</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-text">
        <h1>Hello, I'm <span>Hannugrah</span></h1>
        <p>Mahasiswa Teknik Sipil - Hidrologi</p>
        <a href="#" class="btn">Download CV</a>
    </div>

    <img src="foto.jpg">
</section>

<!-- SKILLS -->
<section class="skills" id="skills">
    <h2>My Skills</h2>

    <p>AutoCAD</p>
    <div class="bar"><div style="width:90%"></div></div>

    <p>ArcGIS</p>
    <div class="bar"><div style="width:85%"></div></div>

    <p>HEC-RAS</p>
    <div class="bar"><div style="width:80%"></div></div>
</section>

<!-- PROJECT -->
<section class="project" id="project">
    <div class="card">
        <img src="layout.jpg" width="200">
        <p>Layout PLTMH</p>
    </div>

    <div class="card">
        <img src="potongan.jpg" width="200">
        <p>Potongan</p>
    </div>

    <div class="card">
        <img src="3d.jpg" width="200">
        <p>3D Power House</p>
    </div>
</section>

</body>
</html>
